# Fly.io app configuration for GreenIEM (Yew frontend + Axum backend, single container).
# Update `app` to the name you registered with `fly apps create <name>` before deploying.
app = "greeniem-store"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
